# Paper-aligned THINGS-EEG intra-subject retrieval defaults.
# Paths, subject IDs, output_dir and proj_meta are injected by run_retrieval.sh.

hidden_size: 1024
intermediate_size: 1024
logit_scale_init_value: 2.6592
dropout: 0.1

brain_backbone: brain_mlp
brain_channels: 17
brain_sequence_length: 250
brain_embedding_dim: 1440
proj_meta: null

embedding_directory: null
data_directory: null
time_slice: [0, 250]
subject_ids: [1]
eval_subject_ids: [1]
brain_key: eeg
avg_trials: true
selected_channels: [P7, P5, P3, P1, Pz, P2, P4, P6, P8, PO7, PO3, POz, PO4, PO8, O1, Oz, O2]
cache_dir: .cache
max_train_samples: null
max_eval_samples: null

seed: 2025
run_name: null
output_dir: null
resume_from_checkpoint: null
do_train: true
do_eval: true
do_predict: true

per_device_train_batch_size: 1024
per_device_eval_batch_size: 200
learning_rate: 5e-4
weight_decay: 0.05
adam_beta1: 0.9
adam_beta2: 0.995
max_grad_norm: 1.0
num_train_epochs: 25
max_steps: -1
lr_scheduler_type: cosine
warmup_steps: 10

dataloader_num_workers: 4
dataloader_pin_memory: true
remove_unused_columns: false
logging_steps: 10
eval_strategy: epoch
save_strategy: 'no'
use_cpu: false
bf16: true
fp16: false
tf32: true
report_to: none
load_best_model_at_end: false
metric_for_best_model: top1_acc
greater_is_better: true
eval_do_concat_batches: true
accelerator_config: null
label_names: []

